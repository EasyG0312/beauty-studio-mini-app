name: Deploy Beauty Studio

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # Frontend deployment to Vercel
  frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run tests
      working-directory: ./frontend
      run: npm test --if-present

    - name: Build frontend
      working-directory: ./frontend
      env:
        NODE_ENV: production
        VITE_DEBUG: false
      run: npm run build

    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        vercel-args: '--prod'

  # Backend deployment to Render
  backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-prod-optimized.txt

    - name: Run tests
      working-directory: ./backend
      run: |
        python -m pytest tests/ -v || echo "Tests not found, skipping..."

    - name: Build Docker image
      working-directory: ./backend
      run: |
        docker build -t beauty-studio-backend:${{ github.sha }} .

    - name: Deploy to Render
      uses: johnbeynon/render-deploy-action@v0.0.8
      with:
        service-id: ${{ secrets.RENDER_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}
        docker-context: ./backend

  # Health checks after deployment
  health-check:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
    - name: Wait for deployments
      run: sleep 60

    - name: Check frontend health
      run: |
        FRONTEND_URL="https://frontend-gamma-livid-32.vercel.app"
        curl -f "$FRONTEND_URL" || echo "Frontend health check failed"

    - name: Check backend health
      run: |
        BACKEND_URL="https://beauty-studio-api.onrender.com"
        curl -f "$BACKEND_URL/api/health" || echo "Backend health check failed"

    - name: Run smoke tests
      run: |
        BACKEND_URL="https://beauty-studio-api.onrender.com"
        
        # Test API endpoints
        curl -f "$BACKEND_URL/api/health"
        curl -f "$BACKEND_URL/"
        
        # Test CORS
        curl -H "Origin: https://frontend-gamma-livid-32.vercel.app" \
             -H "Access-Control-Request-Method: GET" \
             -H "Access-Control-Request-Headers: Content-Type" \
             -X OPTIONS \
             "$BACKEND_URL/api/bookings"

  # Security scan
  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Performance audit
  lighthouse:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        urls: |
          https://frontend-gamma-livid-32.vercel.app
          https://frontend-gamma-livid-32.vercel.app/services
        uploadArtifacts: true
        temporaryPublicStorage: true
