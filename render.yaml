services:
  - type: web
    name: beauty-studio-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /api/analytics/summary
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beauty-studio-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: beauty-studio-db
    databaseName: beauty_studio
    user: beautystudio
    plan: free
    region: frankfurt
